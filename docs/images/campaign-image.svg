<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a83a"/>
      <stop offset="50%" stop-color="#b8962e"/>
      <stop offset="100%" stop-color="#9a7c24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="shield">
      <path d="M400,60 L480,90 L480,200 Q480,280 400,320 Q320,280 320,200 L320,90 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid pattern overlay -->
  <g opacity="0.06" stroke="#b8962e" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- Corner brackets (tactical HUD) -->
  <g stroke="#b8962e" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- Top-left -->
    <polyline points="30,60 30,30 60,30"/>
    <!-- Top-right -->
    <polyline points="740,30 770,30 770,60"/>
    <!-- Bottom-left -->
    <polyline points="30,340 30,370 60,370"/>
    <!-- Bottom-right -->
    <polyline points="740,370 770,370 770,340"/>
  </g>

  <!-- Shield emblem outline -->
  <path d="M400,70 L470,96 L470,195 Q470,268 400,305 Q330,268 330,195 L330,96 Z"
        fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>

  <!-- Inner shield detail -->
  <path d="M400,85 L455,106 L455,190 Q455,252 400,283 Q345,252 345,190 L345,106 Z"
        fill="none" stroke="#b8962e" stroke-width="0.8" opacity="0.2"/>

  <!-- Crosshair in shield -->
  <g stroke="#b8962e" stroke-width="0.8" opacity="0.25">
    <line x1="375" y1="175" x2="425" y2="175"/>
    <line x1="400" y1="150" x2="400" y2="200"/>
    <circle cx="400" cy="175" r="12" fill="none"/>
    <circle cx="400" cy="175" r="4" fill="none"/>
  </g>

  <!-- Star in shield -->
  <polygon points="400,110 408,130 430,130 413,143 419,163 400,152 381,163 387,143 370,130 392,130"
           fill="url(#gold)" opacity="0.5" filter="url(#glow)"/>

  <!-- Horizontal rule lines -->
  <line x1="100" y1="200" x2="310" y2="200" stroke="#b8962e" stroke-width="0.8" opacity="0.3"/>
  <line x1="490" y1="200" x2="700" y2="200" stroke="#b8962e" stroke-width="0.8" opacity="0.3"/>

  <!-- Small diamond accents on the lines -->
  <polygon points="310,200 305,196 300,200 305,204" fill="#b8962e" opacity="0.4"/>
  <polygon points="490,200 495,196 500,200 495,204" fill="#b8962e" opacity="0.4"/>

  <!-- Title text -->
  <text x="400" y="355" text-anchor="middle" font-family="'Oswald', 'Impact', sans-serif"
        font-size="28" font-weight="700" letter-spacing="8" fill="#b8962e" filter="url(#glow)">
    SPECIAL FORCES
  </text>
  <text x="400" y="380" text-anchor="middle" font-family="'Source Sans Pro', 'Helvetica Neue', sans-serif"
        font-size="11" letter-spacing="4" fill="#6a7a8a" opacity="0.7">
    GURPS 4TH EDITION
  </text>

  <!-- Subtle scan line effect -->
  <g opacity="0.03">
    <rect x="0" y="0" width="800" height="1" fill="#fff"/>
    <rect x="0" y="4" width="800" height="1" fill="#fff"/>
    <rect x="0" y="8" width="800" height="1" fill="#fff"/>
    <rect x="0" y="12" width="800" height="1" fill="#fff"/>
    <rect x="0" y="16" width="800" height="1" fill="#fff"/>
    <rect x="0" y="20" width="800" height="1" fill="#fff"/>
    <rect x="0" y="24" width="800" height="1" fill="#fff"/>
    <rect x="0" y="28" width="800" height="1" fill="#fff"/>
    <rect x="0" y="32" width="800" height="1" fill="#fff"/>
    <rect x="0" y="36" width="800" height="1" fill="#fff"/>
    <rect x="0" y="40" width="800" height="1" fill="#fff"/>
    <rect x="0" y="44" width="800" height="1" fill="#fff"/>
    <rect x="0" y="48" width="800" height="1" fill="#fff"/>
    <rect x="0" y="52" width="800" height="1" fill="#fff"/>
    <rect x="0" y="56" width="800" height="1" fill="#fff"/>
    <rect x="0" y="60" width="800" height="1" fill="#fff"/>
    <rect x="0" y="64" width="800" height="1" fill="#fff"/>
    <rect x="0" y="68" width="800" height="1" fill="#fff"/>
    <rect x="0" y="72" width="800" height="1" fill="#fff"/>
    <rect x="0" y="76" width="800" height="1" fill="#fff"/>
  </g>
</svg>
